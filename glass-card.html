<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>iOS 26 Liquid Glass Card — DreamGully</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* The bg: SHARP Memphis patterns — triangles, plus signs, dots, squiggles, circles, cubes, stripes */
.bg {
  position: fixed; inset: 0; z-index: 0;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
}
.bg__panel {
  position: relative; overflow: hidden;
}
.bg__panel--blue { background: #1d4ed8; }
.bg__panel--yellow { background: #fbbf24; }
.bg__panel--pink { background: #ec4899; }

/* Sharp SVG patterns via background-image */
.bg__panel--blue {
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 200 200'><g fill='none' stroke='%23000' stroke-width='3'><circle cx='30' cy='30' r='18'/><circle cx='30' cy='30' r='10' fill='%23fbbf24'/><circle cx='100' cy='80' r='14'/><circle cx='160' cy='40' r='10' fill='%23ec4899'/><path d='M70 140 L100 110 L130 140 Z' fill='%23ec4899'/><path d='M150 130 L180 110 L180 150 Z' fill='%23fff'/><path d='M30 100 h12 M36 94 v12' stroke-width='4'/><path d='M150 80 h12 M156 74 v12' stroke-width='4'/><g><circle cx='10' cy='160' r='2' fill='%23000'/><circle cx='20' cy='170' r='2' fill='%23000'/><circle cx='30' cy='160' r='2' fill='%23000'/><circle cx='40' cy='170' r='2' fill='%23000'/><circle cx='50' cy='160' r='2' fill='%23000'/></g><circle cx='170' cy='170' r='8' fill='%23000'/><circle cx='170' cy='170' r='3' fill='%23fbbf24'/></g></svg>"),
    linear-gradient(135deg, #1d4ed8, #2563eb);
  background-size: 200px 200px, cover;
  background-repeat: repeat, no-repeat;
}
.bg__panel--yellow {
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 200 200'><g fill='none' stroke='%23000' stroke-width='3'><circle cx='40' cy='40' r='18' fill='%23ec4899'/><circle cx='130' cy='60' r='20' fill='%231d4ed8'/><circle cx='170' cy='150' r='14' fill='%23ec4899'/><path d='M70 130 A 12 12 0 1 0 70 130.1' fill='%23000'/><path d='M30 120 q5 -10 10 0 q5 10 10 0' /><path d='M120 30 q5 -10 10 0 q5 10 10 0' /><circle cx='30' cy='180' r='14' fill='%23fff' stroke='%23000'/><circle cx='160' cy='100' r='10' fill='%23fff' stroke='%23000'/><path d='M100 170 L115 155 L100 140 L85 155 Z' fill='%231d4ed8'/></g></svg>"),
    linear-gradient(135deg, #fbbf24, #f59e0b);
  background-size: 200px 200px, cover;
  background-repeat: repeat, no-repeat;
}
.bg__panel--pink {
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 200 200'><g fill='none' stroke='%23000' stroke-width='3'><circle cx='40' cy='40' r='18' fill='%23fbbf24'/><circle cx='40' cy='40' r='8'/><path d='M100 50 L115 35 L130 50 L115 65 Z' fill='%23fbbf24'/><path d='M150 100 L170 90 L170 110 Z' fill='%231d4ed8'/><g><line x1='80' y1='130' x2='110' y2='130'/><line x1='80' y1='138' x2='110' y2='138'/><line x1='80' y1='146' x2='110' y2='146'/></g><g><circle cx='140' cy='150' r='1.5' fill='%23000'/><circle cx='150' cy='160' r='1.5' fill='%23000'/><circle cx='160' cy='150' r='1.5' fill='%23000'/><circle cx='170' cy='160' r='1.5' fill='%23000'/><circle cx='150' cy='170' r='1.5' fill='%23000'/><circle cx='160' cy='180' r='1.5' fill='%23000'/></g><path d='M30 150 q5 -10 10 0 q5 10 10 0' /><circle cx='180' cy='40' r='10' fill='%23fff'/></g></svg>"),
    linear-gradient(135deg, #ec4899, #db2777);
  background-size: 200px 200px, cover;
  background-repeat: repeat, no-repeat;
}

/* The card stage — the iOS 26 Liquid Glass card */
.stage {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 60px 20px;
}

/* ==== THE GLASS CARD — iOS 26 Liquid Glass style ==== */
.glass-card {
  position: relative;
  width: 380px; max-width: 100%;
  border-radius: 28px;
  padding: 32px 28px;
  display: flex; flex-direction: column; gap: 14px;
  color: white;

  /* The glass: very transparent dark, almost no fill */
  background: rgba(20, 20, 30, 0.12);

  /* Subtle blur — the iOS 26 spec is light blur (8-15px) */
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);

  /* The bright thin border — THE defining glass signal */
  border: 1.5px solid rgba(255, 255, 255, 0.45);

  /* The "light hitting top edge" inner highlight */
  box-shadow:
    inset 0 1px 0 0 rgba(255, 255, 255, 0.6),
    inset 0 -1px 0 0 rgba(255, 255, 255, 0.08),
    0 20px 60px rgba(0, 0, 0, 0.15);

  overflow: hidden;
}

/* The TOP SHEEN — explicit linear-gradient that gives the "frosted glass with light at the top" look */
.glass-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(180deg,
    rgba(255, 255, 255, 0.18) 0%,
    rgba(255, 255, 255, 0.05) 40%,
    transparent 100%);
  pointer-events: none;
  border-radius: 28px 28px 0 0;
}

/* The OUTER GLOW — the soft halo that sells "this is glass" */
.glass-card::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 30px;
  background: linear-gradient(135deg,
    rgba(255, 255, 255, 0.3) 0%,
    rgba(255, 255, 255, 0.05) 50%,
    rgba(167, 139, 250, 0.2) 100%);
  z-index: -1;
  filter: blur(12px);
  opacity: 0.6;
}

.glass-card__eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.85);
  position: relative;
  z-index: 2;
}
.glass-card__title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin: 0;
  color: white;
  position: relative;
  z-index: 2;
}
.glass-card__body {
  font-size: 13px;
  margin: 0;
  line-height: 1.55;
  color: rgba(255, 255, 255, 0.95);
  position: relative;
  z-index: 2;
}
.glass-card__chip {
  display: inline-block;
  padding: 6px 12px;
  background: rgba(255, 255, 255, 0.18);
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 100px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: white;
  width: fit-content;
  backdrop-filter: blur(8px);
  position: relative;
  z-index: 2;
  margin-top: 4px;
}

/* Caption below card */
.caption {
  position: fixed;
  bottom: 24px; left: 0; right: 0;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: white;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  z-index: 2;
}
</style>
</head>
<body>

<!-- The Memphis bg -->
<div class="bg">
  <div class="bg__panel bg__panel--blue"></div>
  <div class="bg__panel bg__panel--yellow"></div>
  <div class="bg__panel bg__panel--pink"></div>
</div>

<!-- The glass card -->
<div class="stage">
  <div class="glass-card">
    <span class="glass-card__eyebrow">Real · 01 / 04</span>
    <h2 class="glass-card__title">DreamGully</h2>
    <p class="glass-card__body">The studio itself — the first case study. Brand, web, content, the lot.</p>
    <span class="glass-card__chip">VIEW CASE STUDY →</span>
  </div>
</div>

<p class="caption">iOS 26 Liquid Glass · Memphis bg · frosted</p>

</body>
</html>
