<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; overflow-x: hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ==== MEMPHIS PATTERN BG ==== */
.bg { position: fixed; inset: 0; z-index: 0; display: grid; grid-template-columns: 1fr 1fr 1fr; }

.bg__panel--yellow { background: #fbbf24; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220' viewBox='0 0 220 220'><g fill='none' stroke='%23000' stroke-width='3'><circle cx='40' cy='40' r='22' fill='%23ec4899'/><circle cx='40' cy='40' r='10'/><circle cx='130' cy='60' r='24' fill='%231d4ed8'/><circle cx='180' cy='150' r='16' fill='%23ec4899'/><circle cx='180' cy='150' r='6'/><path d='M30 120 q5 -10 10 0 q5 10 10 0 q5 -10 10 0 q5 10 10 0' /><path d='M120 30 q5 -10 10 0 q5 10 10 0' /><path d='M30 190 q5 -10 10 0 q5 10 10 0' /><circle cx='40' cy='180' r='16' fill='%23fff' stroke='%23000'/><circle cx='180' cy='50' r='12' fill='%23fff' stroke='%23000'/><path d='M100 170 L115 155 L100 140 L85 155 Z' fill='%231d4ed8'/><g><circle cx='75' cy='100' r='1.5' fill='%23000'/><circle cx='85' cy='110' r='1.5' fill='%23000'/><circle cx='95' cy='100' r='1.5' fill='%23000'/><circle cx='75' cy='120' r='1.5' fill='%23000'/></g></g></svg>"), linear-gradient(135deg, #fbbf24, #f59e0b); background-size: 220px 220px, cover; background-repeat: repeat, no-repeat; }
.bg__panel--pink { background: #ec4899; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220' viewBox='0 0 220 220'><g fill='none' stroke='%23000' stroke-width='3'><circle cx='40' cy='40' r='22' fill='%23fbbf24'/><circle cx='40' cy='40' r='10'/><path d='M110 50 L130 30 L150 50 L130 70 Z' fill='%23fbbf24'/><path d='M170 100 L195 90 L195 115 Z' fill='%231d4ed8'/><g><line x1='80' y1='130' x2='120' y2='130'/><line x1='80' y1='140' x2='120' y2='140'/><line x1='80' y1='150' x2='120' y2='150'/></g><g><circle cx='150' cy='150' r='2' fill='%23000'/><circle cx='162' cy='160' r='2' fill='%23000'/><circle cx='174' cy='150' r='2' fill='%23000'/><circle cx='186' cy='160' r='2' fill='%23000'/><circle cx='162' cy='172' r='2' fill='%23000'/><circle cx='174' cy='184' r='2' fill='%23000'/><circle cx='150' cy='184' r='2' fill='%23000'/></g><path d='M30 150 q5 -10 10 0 q5 10 10 0 q5 -10 10 0' /><circle cx='190' cy='40' r='14' fill='%23fff'/><path d='M40 100 h12 M46 94 v12' stroke-width='4'/></g></svg>"), linear-gradient(135deg, #ec4899, #db2777); background-size: 220px 220px, cover; background-repeat: repeat, no-repeat; }

/* Stage */
.stage { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 20px; gap: 24px; flex-wrap: wrap; }

/* ==== iOS 26 LIQUID GLASS CARD — NICK'S FIGMA RECIPE ==== */
/* Settings: radius 23, stroke=3-stop-white-gradient (5%, 100%, 5%) diagonal, fill=white 2%, blur 10, drop shadow + inner shadows */
.glass-card {
  position: relative;
  border-radius: 23px;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 10px;
  color: white;
  isolation: isolate;
  /* Nick's fill: white at 2% */
  background: rgba(255, 255, 255, 0.02);
  /* Nick's effects — exactly as in the tutorial */
  backdrop-filter: blur(10px) saturate(180%);
  -webkit-backdrop-filter: blur(10px) saturate(180%);
  /* Nick's drop shadow stack: 0/1/0/0 black 5% + 0/1/2/0 black 20% */
  box-shadow:
    /* Inner shadow top: 0/1/0/0 white 100% (the top edge highlight) */
    inset 0 1px 0 0 rgba(255, 255, 255, 1),
    /* Inner shadow bottom: 0/-1/2/0 white 15% (the bottom edge highlight) */
    inset 0 -1px 2px 0 rgba(255, 255, 255, 0.15),
    /* Drop shadow: 0/1/0/0 black 5% */
    0 1px 0 0 rgba(0, 0, 0, 0.05),
    /* Drop shadow: 0/1/2/0 black 20% */
    0 1px 2px 0 rgba(0, 0, 0, 0.2);
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  font-size: 17px; font-weight: 500;
  letter-spacing: -0.01em;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
}

/* Nick's stroke: 3-stop white gradient (5%, 100%, 5%), diagonal bottom-left → top-right */
.glass-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 23px;
  padding: 1px;
  background: linear-gradient(45deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 1) 50%, rgba(255, 255, 255, 0.05) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  z-index: 1;
}

.glass-card__icon { width: 18px; height: 18px; position: relative; z-index: 2; color: white; }
.glass-card__icon svg { width: 100%; height: 100%; }
.glass-card__label { position: relative; z-index: 2; }

/* The big content card with the same recipe */
.glass-card--content {
  width: 400px; max-width: 100%;
  border-radius: 32px;
  padding: 32px 28px;
  flex-direction: column;
  align-items: flex-start;
  gap: 12px;
  background: rgba(255, 255, 255, 0.04);
}
.glass-card--content::before { border-radius: 32px; padding: 1.5px; background: linear-gradient(45deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.6) 50%, rgba(255, 255, 255, 0.08) 100%); }

.caption {
  position: fixed; bottom: 24px; left: 0; right: 0;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  z-index: 2;
}
</style>
